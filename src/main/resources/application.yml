server:
  port: 8090

spring:
  cloud:
    gateway:
      globalcors:
        cors-configurations:
          '[/**]': # Aplica a todas las rutas
            allowedOrigins:
              - "http://localhost:3000" # Si usas Create React App
              - "http://localhost:5173" # Si usas Vite
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS # Muy importante para las peticiones "preflight" de los navegadores
            allowedHeaders: "*"
      routes:
        - id: bff-catalogo
          uri: http://localhost:8084
          predicates:
            - Path=/bff/**
          filters:
            - StripPrefix=1

        - id: ms-productos
          uri: http://localhost:8082
          predicates:
            - Path=/api/productos/**

        - id: ms-categorias
          uri: http://localhost:8083
          predicates:
            - Path=/api/categorias/**

        - id: ms-stock
          uri: http://localhost:8085
          predicates:
            - Path=/api/stock/**