server:
  port: 8090

spring:
  cloud:
    gateway:
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins:
              - "http://localhost:3000"
              - "http://localhost:5173"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
      routes:
        # --- BFF ---
        - id: bff-catalogo
          uri: http://localhost:8086
          predicates:
            - Path=/bff/**


        # --- MICROSERVICIOS ---
        - id: ms-productos
          uri: http://localhost:8082
          predicates:
            - Path=/api/productos/**

        - id: ms-categorias
          uri: http://localhost:8083
          predicates:
            - Path=/api/categorias/**

        - id: ms-stock
          uri: http://localhost:8085
          predicates:
            - Path=/api/stock/**


        - id: ms-ventas
          uri: http://localhost:8081
          predicates:
            - Path=/api/ventas/**

        - id: ms-sucursales
          uri: http://localhost:8084
          predicates:
            - Path=/api/sucursales/**